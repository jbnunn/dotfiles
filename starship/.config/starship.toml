add_newline = false
command_timeout = 1000
palette = "catppuccin_macchiato"

# Left side - custom prompt
format = """
👾 jbnunn $directory$git_branch$git_status$character"""

[character]
success_symbol = '[](peach)[](sky) '
error_symbol = '[](red)[](sky) '
vicmd_symbol = '[](yellow)[](sky) '

[directory]
truncation_length = 3
format = '[$path]($style) '
style = 'bold white'

[git_branch]
format = 'on [$symbol$branch(:$remote_branch)]($style) '
symbol = ' '
style = 'bold purple'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = 'bold red'
conflicted = '🏳'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = ''
untracked = '?${count}'
stashed = '${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

[golang]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold cyan'

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = ' '
style = 'bold yellow'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold green'

[rust]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold red'

[cmd_duration]
min_time = 500
format = '[$duration]($style) '
style = 'bold yellow'

[time]
disabled = false
format = '[$time]($style)'
style = 'bold dimmed white'
time_format = '%T'

[username]
show_always = false
format = '[$user]($style)@'
style_user = 'bold green'

[hostname]
ssh_only = true
format = '[$hostname]($style) in '
style = 'bold green'

# Keep these disabled
[aws]
disabled = true

[battery]
disabled = false
format = '[$percentage]($style)'
display = [
  { threshold = 100, style = "bold green" }
]

[memory_usage]
disabled = true

[localip]
disabled = true

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
